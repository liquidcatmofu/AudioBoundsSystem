name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  java-17:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build and test
        run: ./gradlew build --no-daemon
